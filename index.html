<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Admin Dashboard</title>
</head>

<body>
    <nav class="left-nav-flex">
        <div id="logo">
            <img src="./icons/dashboard.png" alt="dashboard icon" class="icon-48">
            <h2>Dashboard</h2>
        </div>
        <div class="button-panel">
            <div class="nav-button">
                <img src="./icons/home.png" alt="Home" class="icon">
                <h3>Home</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/account-details.png" alt="Profile" class="icon">
                <h3>Profile</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/message.png" alt="Messages" class="icon">
                <h3>Messages</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/history.png" alt="History" class="icon">
                <h3>History</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/files.png" alt="Tasks" class="icon">
                <h3>Tasks</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/communities.png" alt="Communities" class="icon">
                <h3>Communities</h3>
            </div>
        </div>
        <div class="button-panel">
            <div class="nav-button">
                <img src="./icons/settings.png" alt="Settings" class="icon">
                <h3>Settings</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/help.png" alt="Support" class="icon">
                <h3>Support</h3>
            </div>
            <div class="nav-button">
                <img src="./icons/profile.png" alt="Privacy" class="icon">
                <h3>Privacy</h3>
            </div>
        </div>
    </nav>
    <div id="top-bar">
        <div class="top-page">
            <div class="search-bar">

            </div>
            <div class="login">

            </div>
        </div>
        <div class="upload">
            <div class="user">

            </div>
            <div class="upload-icons"></div>
        </div>
    </div>
    <main>
        <div class="projects">

        </div>
        <aside id="news">
            <div id="announcements">

            </div>
            <div id="trending">

            </div>
        </aside>
    </main>
</body>

</html>
